name: 'terraform plan'
description: 'Runs terraform plan for a specific layer'

inputs:
  workspace_name:
    description: 'Workspace name'
    required: false
    default: 'default'
  layer:
    description: 'Layer name which have to be deployed (e.g. bootstrap, ops, app)'
    required: true
    default: 'bootstrap'
  role_account_id:
    description: 'AWS Account ID for role assumption'
    required: true

outputs:
  plan_exitcode:
    description: "The exit code of the terraform plan command"
    value: ${{ steps.tf_plan.outputs.plan_exitcode }}

runs:
  using: "composite"
  steps:
    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v5.1.1
      with:
        role-to-assume: arn:aws:iam::${{ inputs.role_account_id }}:role/github_actions_oidc
        role-session-name: GHA_TF_PLAN
        aws-region: eu-central-1
        
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
        
    - name: Terraform Init
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: terraform init -input=false

    - name: Terraform Validate
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: terraform validate

    - name: Terraform workspace
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: |
        terraform workspace select ${{ inputs.workspace_name }}

    - name: Terraform plan
      id: tf_plan
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: |
        set +e
        terraform plan -detailed-exitcode -var="name=${{ inputs.workspace_name }}" -lock=true -lock-timeout=5m -input=false -out=tfplan
        exitcode=$?
        echo "plan_exitcode=$exitcode" >> $GITHUB_OUTPUT
        if [ $exitcode -eq 1 ]; then
          exit 1
        fi
        terraform show -no-color tfplan > tfplan.txt

    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ inputs.workspace_name }}-${{ inputs.layer }}
        path: |
          ./terraform/layers/${{ inputs.layer }}/tfplan
          ./terraform/layers/${{ inputs.layer }}/tfplan.txt
          ./terraform/layers/${{ inputs.layer }}/*.zip
