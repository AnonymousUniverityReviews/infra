name: 'terraform apply'
description: 'Runs terraform apply for a specific layer'

inputs:
  layer:
    description: 'Layer name which have to be deployed (e.g. bootstrap, ops, app)'
    required: true
    default: 'bootstrap'
  role_account_id:
    description: 'AWS Account ID for role assumption'
    required: true

runs:
  using: "composite"
  steps:
    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v5.1.1
      with:
        role-to-assume: arn:aws:iam::${{ inputs.role_account_id }}:role/github_actions_oidc
        role-session-name: GHA_TF_APPLY
        aws-region: eu-central-1
        
    - uses: hashicorp/setup-terraform@v3

    - uses: actions/download-artifact@v5
      with:
        name: terraform-plan-${{ inputs.layer }}
        path: ./terraform/layers/${{ inputs.layer }}

    - name: Terraform Init
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: terraform init -input=false

    - name: Terraform Validate
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: terraform validate

    - name: Terraform Apply
      shell: bash
      working-directory: ./terraform/layers/${{ inputs.layer }}
      env:
        TF_IN_AUTOMATION: "true"
      run: terraform apply -lock=true -lock-timeout=5m -input=false tfplan
