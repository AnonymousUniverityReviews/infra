name: terraform apply

on:
  workflow_call:
    inputs:
      workspace_name:
        description: 'Workspace name'
        required: true
        type: string
        default: 'default'
      layer:
        description: 'Layer name which have to be deployed (e.g. bootstrap, ops, app)'
        type: string
        default: bootstrap
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  id-token: write

jobs:
  apply:
    environment: prod
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/layers/${{ inputs.layer }}
    concurrency:
      group: terraform-state
      cancel-in-progress: false
    env:
      TF_IN_AUTOMATION: true
    steps:
      - uses: actions/checkout@v5
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github_actions_oidc
          role-session-name: GHA_TF_APPLY
          aws-region: eu-central-1
      - uses: hashicorp/setup-terraform@v3
      - uses: actions/download-artifact@v5
        with:
          name: terraform-plan-${{ inputs.workspace_name }}-${{ inputs.layer }}
          path: ./terraform/layers/${{ inputs.layer }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform workspace
        run: |
          terraform workspace select ${{ inputs.workspace_name }}
      - name: Terraform Apply
        run: terraform apply -lock=true -lock-timeout=5m -input=false tfplan
