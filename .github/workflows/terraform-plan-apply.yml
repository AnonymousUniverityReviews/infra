name: Plan and Apply

on: 
  workflow_call:
        inputs:
          layer:
            description: 'Layer name which have to be deployed (e.g. bootstrap, ops, app)'
            type: string
            default: bootstrap
        secrets:
          AWS_ACCOUNT_ID: 
            required: true

permissions:
  id-token: write

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.plan_exitcode }}
    steps:
      - uses: actions/checkout@v5
      - id: plan
        name: Run Terraform Plan Action
        uses: ./.github/actions/terraform-plan
        with:
          layer: ${{ inputs.layer }}
          role_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

  apply:
    name: Terraform apply
    needs: [plan]
    if: ${{ needs.plan.outputs.plan_exitcode == '2' }} 
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5
      - name: Run Terraform Apply Action
        uses: ./.github/actions/terraform-apply
        with:
          layer: ${{ inputs.layer }}
          role_account_id: ${{ secrets.AWS_ACCOUNT_ID }}