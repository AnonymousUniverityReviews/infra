appName: "backend"

replicaCount: 1

serviceAccount:
  name: "backend"

podAnnotations: {
  "consul.hashicorp.com/connect-inject": "true",
}

podLabels: {
  tier: backend
}

deploymentLabels: {
  tier: backend
}

service:
  name: backend
  type: ClusterIP
  port: 80
  targetPort: 80

container:
  name: backend
  port: 80
  image:
    repository: 585517712585.dkr.ecr.eu-central-1.amazonaws.com/backend
    tag: main
  healthEndpoint: /healthz
  healthPort: 80
  resources:
    requests:
      cpu: "100m"
    limits:
      cpu: "250m"

env: {
  ASPNETCORE_URLS: "http://+:80",
  HealthCheck__RequireHost: ""
}
secretEnv: {
  EmailSecrets__EmailHashKey: "backend-email-secrets-hash-key",
  EmailSecrets__EmailVerificationTokenHashKey: "backend-email-verification-token-hash-key",
  Resend__Key: "backend-resend-key"
}

envFromSecrets:
  - "backend-database-connections-main-database"
  - "backend-database-connections-data-protection-database"
  - "backend-openiddict-certificates-meta"

secretVolumes:
  - name: "backend-openiddict-certificates"
    secretName: "backend-openiddict-certificates"
    mountPath: "/encryption_certs"
