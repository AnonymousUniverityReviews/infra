apiVersion: consul.hashicorp.com/v1alpha1
kind: IngressGateway
metadata:
  name: ingress-gateway
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.domain }}
  namespace: default
spec:
  listeners:
    - port: 80
      protocol: http
      services:
        - name: frontend
          hosts: ["*"]