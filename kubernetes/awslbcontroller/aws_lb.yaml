apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: alb
spec:
  controllerName: gateway.k8s.aws/alb
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: alb
  namespace: consul
  annotations:  
    external-dns.alpha.kubernetes.io/hostname: studentus.tech
spec:
  gatewayClassName: alb
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: alb
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: alb
  namespace: consul
spec:
  loadBalancerName: some-balancer
  ipAddressType: ipv4
  scheme: internet-facing
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-app-1
  namespace: consul
spec:
  parentRefs:
  - name: alb
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: consul-ingress-gateway
      port: 80
