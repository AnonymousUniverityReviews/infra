apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  destination:
    namespace: 'default'
    server: https://kubernetes.default.svc
  source:
    path: helm/consul-gateway
    repoURL: https://github.com/AnonymousUniverityReviews/infra.git
    targetRevision: infra
    helm:
      valueFiles:
        - values.yaml
  sources: []
  project: default
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
